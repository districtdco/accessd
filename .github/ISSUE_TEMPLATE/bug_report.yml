name: Bug report
description: Report a reproducible defect in AccessD
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.
        Please provide enough detail so the Districtd maintainers can reproduce and fix it quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the problem
      placeholder: API returns 500 when launching SSH session
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API
        - Connector
        - UI
        - Deployment
        - Documentation
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, deterministic sequence
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, connector version, server version, deployment mode
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets before sharing
      render: shell
    validations:
      required: false
