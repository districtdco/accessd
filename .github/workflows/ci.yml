name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contracts:
    name: Contracts Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenAPI contract
        run: npx --yes @apidevtools/swagger-cli validate packages/contracts/api.yaml

  go:
    name: Go Test + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Test API
        run: |
          cd apps/api
          go test ./...

      - name: Build API
        run: |
          cd apps/api
          go build -ldflags "-X main.version=${GITHUB_SHA} -X main.commit=${GITHUB_SHA} -X main.builtAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o bin/pam-server ./cmd/server

      - name: Test Connector
        run: |
          cd apps/connector
          go test ./...

      - name: Build Connector
        run: |
          cd apps/connector
          go build -o bin/pam-connector ./cmd/connector

  ui:
    name: UI Install + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI deps
        run: |
          cd apps/ui
          npm ci

      - name: Build UI
        run: |
          cd apps/ui
          npm run build
