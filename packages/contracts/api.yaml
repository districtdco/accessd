          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time

    VersionResponse:
      type: object
      required: [service, version, commit, built_at, timestamp]
      properties:
        service:
          type: string
        version:
          type: string
        commit:
          type: string
        built_at:
          type: string
        timestamp:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, roles]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string

    PingResponse:
      type: object
      required: [status, scope]
      properties:
        status:
          type: string
        scope:
          type: string
        user:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AdminUsersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"

    AdminUser:
      type: object
      required: [id, username, is_active, roles]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string

    AdminUserDetail:
      allOf:
        - $ref: "#/components/schemas/AdminUser"
        - type: object
          required: [groups]
          properties:
            groups:
              type: array
              items:
                $ref: "#/components/schemas/AdminGroup"

    AdminRolesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminRole"

    AdminRole:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    AdminAssignRoleRequest:
      type: object
      required: [role_name]
      properties:
        role_name:
          type: string

    AdminGroupsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminGroup"

    AdminGroup:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        member_count:
          type: integer
          minimum: 0

    AdminGroupMembersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminGroupMember"

    AdminGroupMember:
      type: object
      required: [id, username]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string

    AdminAssetsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminAsset"

    AdminAsset:
      type: object
      required: [id, name, asset_type, host, port, endpoint, grant_count, credential_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_type:
          type: string
          enum: [linux_vm, database, redis]
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        endpoint:
          type: string
        grant_count:
          type: integer
          minimum: 0
        credential_count:
          type: integer
          minimum: 0

    AdminUpsertAssetRequest:
      type: object
      required: [name, asset_type, host, port]
      properties:
        name:
          type: string
        asset_type:
          type: string
          enum: [linux_vm, database, redis]
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        metadata:
          type: object
          additionalProperties: true

    AdminAssetDetail:
      type: object
      required: [id, name, asset_type, host, port, endpoint, metadata, credentials]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_type:
          type: string
          enum: [linux_vm, database, redis]
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        endpoint:
          type: string
        metadata:
          type: object
          additionalProperties: true
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/AdminCredentialSummary"

    AdminCredentialSummary:
      type: object
      required: [id, credential_type, algorithm, key_id, metadata, created_at, updated_at, secret_available]
      properties:
        id:
          type: string
          format: uuid
        credential_type:
          type: string
          enum: [password, ssh_key, db_password]
        username:
          type: string
        algorithm:
          type: string
        key_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_rotated_at:
          type: string
          format: date-time
        secret_available:
          type: boolean

    AdminAssetCredentialListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminCredentialSummary"

    AdminUpsertCredentialRequest:
      type: object
      required: [secret]
      properties:
        username:
          type: string
        secret:
          type: string
        metadata:
          type: object
          additionalProperties: true

    AdminGrantsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminGrant"

    AdminGrant:
      type: object
      required: [subject_type, subject_id, subject_name, asset_id, asset_name, action, effect, created_at]
      properties:
        subject_type:
          type: string
          enum: [user, group]
        subject_id:
          type: string
          format: uuid
        subject_name:
          type: string
        asset_id:
          type: string
          format: uuid
        asset_name:
          type: string
        action:
          type: string
          enum: [shell, sftp, dbeaver, redis]
        effect:
          type: string
          enum: [allow, deny]
        created_at:
          type: string
          format: date-time

    AdminAddUserGrantRequest:
      type: object
      required: [asset_id, action]
      properties:
        asset_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [shell, sftp, dbeaver, redis]

    AdminEffectiveAccessResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminEffectiveAccessItem"

    AdminEffectiveAccessItem:
      type: object
      required: [asset_id, asset_name, actions]
      properties:
        asset_id:
          type: string
          format: uuid
        asset_name:
          type: string
        actions:
          type: array
          items:
            $ref: "#/components/schemas/AdminEffectiveAccessAction"

    AdminEffectiveAccessAction:
      type: object
      required: [action, sources]
      properties:
        action:
          type: string
          enum: [shell, sftp, dbeaver, redis]
        sources:
          type: array
          items:
            type: string

    AdminSummaryResponse:
      type: object
      required: [window_days, generated_at, metrics, by_action]
      properties:
        window_days:
          type: integer
          minimum: 1
          maximum: 90
        generated_at:
          type: string
          format: date-time
        metrics:
          $ref: "#/components/schemas/AdminSummaryMetrics"
        by_action:
          type: array
          items:
            $ref: "#/components/schemas/AdminActionCount"

    AdminSummaryMetrics:
      type: object
      required: [recent_sessions, active_sessions, failed_sessions, shell_launches, dbeaver_launches]
      properties:
        recent_sessions:
          type: integer
          minimum: 0
        active_sessions:
          type: integer
          minimum: 0
        failed_sessions:
          type: integer
          minimum: 0
        shell_launches:
          type: integer
          minimum: 0
        dbeaver_launches:
          type: integer
          minimum: 0

    AdminActionCount:
      type: object
      required: [action, count]
      properties:
        action:
          type: string
        count:
          type: integer
          minimum: 0

    AdminAuditRecentResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuditItem"

    AdminAuditEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuditItem"

    AdminAuditEventDetailResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/AdminAuditItem"

    AdminAuditItem:
      type: object
      required: [id, event_time, event_type, metadata]
      properties:
        id:
          type: integer
          minimum: 1
        event_time:
          type: string
          format: date-time
        event_type:
          type: string
        action:
          type: string
        outcome:
          type: string
        actor_user:
          $ref: "#/components/schemas/SessionEventUser"
        asset:
          $ref: "#/components/schemas/AdminAuditAsset"
        session:
          $ref: "#/components/schemas/AdminAuditSession"
        session_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    AdminAuditAsset:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_type:
          type: string
          enum: [linux_vm, database, redis]

    AdminAuditSession:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    SessionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionSummary"

    SessionSummary:
      type: object
      required: [session_id, user, asset, action, launch_type, status, created_at, lifecycle]
      properties:
        session_id:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/SessionSummaryUser"
        asset:
          $ref: "#/components/schemas/SessionSummaryAsset"
        action:
          type: string
          enum: [shell, sftp, dbeaver, redis]
        launch_type:
          type: string
        status:
          type: string
          enum: [pending, active, completed, failed, terminated, expired]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          minimum: 0
        lifecycle:
          $ref: "#/components/schemas/SessionLifecycleSummary"

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          required: [protocol, launched_via]
          properties:
            protocol:
              type: string
            launched_via:
              type: string

    SessionExportSummaryResponse:
      type: object
      required: [session, event_type_counts, event_count]
      properties:
        session:
          $ref: "#/components/schemas/SessionDetail"
        event_type_counts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        event_count:
          type: integer
          minimum: 0

    SessionEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionEvent"
        next_after_id:
          type: integer
          minimum: 0

    SessionEvent:
      type: object
      required: [id, event_type, event_time, payload]
      properties:
        id:
          type: integer
          minimum: 1
        event_type:
          type: string
        event_time:
          type: string
          format: date-time
        actor_user:
          $ref: "#/components/schemas/SessionEventUser"
        payload:
          type: object
          additionalProperties: true
        transcript:
          $ref: "#/components/schemas/SessionTranscriptChunk"

    SessionTranscriptChunk:
      type: object
      required: [direction]
      properties:
        direction:
          type: string
          enum: [in, out]
        stream:
          type: string
        size:
          type: integer
          minimum: 0
        text:
          type: string

    SessionReplayResponse:
      type: object
      required: [session_id, supported, approximate, items]
      properties:
        session_id:
          type: string
          format: uuid
        supported:
          type: boolean
        approximate:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionReplayChunk"
        next_after_id:
          type: integer
          minimum: 0

    SessionReplayChunk:
      type: object
      required: [event_id, event_time, direction, text]
      properties:
        event_id:
          type: integer
          minimum: 1
        event_time:
          type: string
          format: date-time
        direction:
          type: string
          enum: [in, out]
        stream:
          type: string
        size:
          type: integer
          minimum: 0
        text:
          type: string

    SessionSummaryUser:
      type: object
      required: [id, username]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string

    SessionSummaryAsset:
      type: object
      required: [id, name, asset_type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_type:
          type: string
          enum: [linux_vm, database, redis]

    SessionLifecycleSummary:
      type: object
      required:
        - started
        - ended
        - failed
        - shell_started
        - connector_requested
        - connector_succeeded
        - connector_failed
        - event_count
      properties:
        started:
          type: boolean
        ended:
          type: boolean
        failed:
          type: boolean
        shell_started:
          type: boolean
        connector_requested:
          type: boolean
        connector_succeeded:
          type: boolean
        connector_failed:
          type: boolean
        event_count:
          type: integer
          minimum: 0
        first_event_at:
          type: string
          format: date-time
        last_event_at:
          type: string
          format: date-time

    SessionEventUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string

    MyAccessResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AccessPoint"

    AccessPoint:
      type: object
      required: [asset_id, asset_name, asset_type, host, port, endpoint, allowed_actions]
      properties:
        asset_id:
          type: string
          format: uuid
        asset_name:
          type: string
        asset_type:
          type: string
          enum: [linux_vm, database, redis]
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        endpoint:
          type: string
        allowed_actions:
          type: array
          items:
            type: string
            enum: [shell, sftp, dbeaver, redis]

    LaunchSessionRequest:
      type: object
      required: [asset_id, action]
      properties:
        asset_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [shell, sftp, dbeaver, redis]

    LaunchSessionResponse:
      type: object
      required: [session_id, launch_type, launch]
      properties:
        session_id:
          type: string
          format: uuid
        launch_type:
          type: string
          enum: [shell, sftp, dbeaver, redis]
        launch:
          oneOf:
            - $ref: "#/components/schemas/ShellLaunchConnection"
            - $ref: "#/components/schemas/SFTPLaunchConnection"
            - $ref: "#/components/schemas/DBeaverLaunchConnection"
            - $ref: "#/components/schemas/RedisLaunchConnection"

    ShellLaunchConnection:
      type: object
      required: [proxy_host, proxy_port, username, token, expires_at]
      properties:
        proxy_host:
          type: string
        proxy_port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
          description: SSH username to use when connecting to PAM proxy.
        token:
          type: string
          description: Short-lived HMAC-signed launch token used for SSH proxy authentication.
        expires_at:
          type: string
          format: date-time

    DBeaverLaunchConnection:
      type: object
      required: [engine, host, port, username, password, expires_at]
      properties:
        engine:
          type: string
          description: Database engine identifier (for initial DBeaver driver mapping).
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        database:
          type: string
        username:
          type: string
        password:
          type: string
          description: Resolved DB credential secret for first connector-launched session material.
        ssl_mode:
          type: string
        expires_at:
          type: string
          format: date-time

    SFTPLaunchConnection:
      type: object
      required: [host, port, username, password, expires_at]
      properties:
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
        password:
          type: string
          description: Resolved SFTP credential secret used by connector-launched FileZilla/WinSCP.
        path:
          type: string
          description: Optional initial remote path for the file transfer client.
        expires_at:
          type: string
          format: date-time

    RedisLaunchConnection:
      type: object
      required: [redis_host, redis_port, redis_password, expires_at]
      properties:
        redis_host:
          type: string
        redis_port:
          type: integer
          minimum: 1
          maximum: 65535
        redis_username:
          type: string
        redis_password:
          type: string
          description: Resolved Redis password used by local redis-cli launch (`REDISCLI_AUTH`).
        redis_database:
          type: integer
          minimum: 0
        redis_tls:
          type: boolean
        redis_insecure_skip_verify_tls:
          type: boolean
        expires_at:
          type: string
          format: date-time

    SessionEventRequest:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: string
          enum:
            - connector_launch_requested
            - connector_launch_succeeded
            - connector_launch_failed
        metadata:
          type: object
          additionalProperties: true

    SessionEventResponse:
      type: object
      required: [status, session_id]
      properties:
        status:
          type: string
          enum: [recorded]
        session_id:
          type: string
          format: uuid

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: pam_session
