          name: session_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: after_id
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Ordered event list for the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEventsResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Record connector launch lifecycle metadata for an existing session
      operationId: postSessionEvent
      tags: [sessions]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionEventRequest"
      responses:
        "202":
          description: Session lifecycle event recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEventResponse"
        "400":
          description: Invalid request payload or unsupported event type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Session does not belong to authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{session_id}/replay:
    get:
      summary: Get normalized first-pass shell replay chunks
      operationId: getSessionReplay
      tags: [sessions]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: after_id
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
