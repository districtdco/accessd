      tags: [sessions]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaunchSessionRequest"
      responses:
        "200":
          description: Launch session created with managed launch payload for the requested action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchSessionResponse"
        "400":
          description: Invalid request payload or unsupported asset/action launch combination.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
