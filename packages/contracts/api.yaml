openapi: "3.1.0"
info:
  title: PAM API
  version: 0.1.0
  description: Privileged Access Management system API (provider-based auth supports local, LDAP, and hybrid modes).

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: Liveness and readiness probes.
  - name: version
    description: Service build/version metadata.
  - name: auth
    description: "Authentication/session endpoints (provider-backed auth: local, ldap, or hybrid fallback mode)."
  - name: assets
    description: Asset inventory endpoints (planned).
  - name: access
    description: Access grant and policy endpoints (planned).
  - name: sessions
    description: Session launch and lifecycle endpoints (planned).
  - name: audit
    description: Audit query endpoints (planned).
  - name: admin
    description: Admin/operator helper endpoints for RBAC and access grant management.

paths:
  /health/live:
    get:
      summary: Liveness check
      operationId: getHealthLive
      tags: [health]
      responses:
        "200":
          description: Service process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/ready:
    get:
      summary: Readiness check
      operationId: getHealthReady
      tags: [health]
      responses:
        "200":
          description: Service dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /version:
    get:
      summary: Service version metadata
      operationId: getVersion
      tags: [version]
      responses:
        "200":
          description: Service version payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /auth/login:
    post:
      summary: Login with configured auth provider mode (local, ldap, or hybrid)
      operationId: postAuthLogin
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful.
          headers:
            Set-Cookie:
              description: HTTP-only session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: Logout current session
      operationId: postAuthLogout
      tags: [auth]
      responses:
        "204":
          description: Logged out; session cookie cleared.

  /me:
    get:
      summary: Get current authenticated user
      operationId: getMe
      tags: [auth]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/ping:
    get:
      summary: Authenticated test endpoint
      operationId: getAuthPing
      tags: [auth]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Authenticated request succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/ping:
    get:
      summary: Admin-only test endpoint
      operationId: getAdminPing
      tags: [auth]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Admin request succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      summary: List users for admin management
      operationId: getAdminUsers
      tags: [admin]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of users with assigned roles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{user_id}:
    get:
      summary: Get admin detail view for a user
      operationId: getAdminUserDetail
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User detail including roles and groups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/roles:
    get:
      summary: List available roles
      operationId: getAdminRoles
      tags: [admin]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Available role catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRolesResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{user_id}/roles:
    post:
      summary: Assign role to user
      operationId: postAdminUserRole
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAssignRoleRequest"
      responses:
        "204":
          description: Role assigned (idempotent).
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User or role not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{user_id}/roles/{role_name}:
    delete:
      summary: Remove role from user
      operationId: deleteAdminUserRole
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: role_name
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Role removed (idempotent).
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User or role not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/groups:
    get:
      summary: List groups
      operationId: getAdminGroups
      tags: [admin]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of groups with member counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminGroupsResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/groups/{group_id}/members:
    get:
      summary: List members in a group
      operationId: getAdminGroupMembers
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: group_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminGroupMembersResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Group not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/groups/{group_id}/grants:
    get:
      summary: List group-related grants
      operationId: getAdminGroupGrants
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: group_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Grants where the group is the subject.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminGrantsResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Group not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/assets:
    get:
      summary: List assets for admin grant management
      operationId: getAdminAssets
      tags: [admin]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Asset list with grant counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAssetsResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a managed asset
      operationId: postAdminAsset
      tags: [admin]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpsertAssetRequest"
      responses:
        "201":
          description: Asset created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAsset"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/assets/{asset_id}:
    get:
      summary: Get admin detail for an asset
      operationId: getAdminAssetDetail
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: asset_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Asset detail including credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAssetDetail"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update an existing asset
      operationId: putAdminAsset
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: asset_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpsertAssetRequest"
      responses:
        "200":
          description: Asset updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAsset"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/assets/{asset_id}/credentials:
    get:
      summary: List safe credential metadata for an asset
      operationId: getAdminAssetCredentials
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: asset_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Credential metadata list (no plaintext secrets).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAssetCredentialListResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/assets/{asset_id}/credentials/{credential_type}:
    put:
      summary: Create or update credential material for an asset
      operationId: putAdminAssetCredential
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: asset_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: credential_type
          required: true
          schema:
            type: string
            enum: [password, ssh_key, db_password]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpsertCredentialRequest"
      responses:
        "200":
          description: Credential updated (metadata only).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCredentialSummary"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/assets/{asset_id}/grants:
    get:
      summary: List grants for an asset
      operationId: getAdminAssetGrants
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: asset_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Grants on the asset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminGrantsResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{user_id}/grants:
    get:
      summary: List direct grants for a user
      operationId: getAdminUserGrants
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Direct user grants.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminGrantsResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Add direct allow-grant for a user
      operationId: postAdminUserGrant
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAddUserGrantRequest"
      responses:
        "204":
          description: User grant added or updated.
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User or asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{user_id}/grants/{asset_id}/{action}:
    delete:
      summary: Remove direct allow-grant for a user action on an asset
      operationId: deleteAdminUserGrant
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: asset_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [shell, sftp, dbeaver, redis]
      responses:
        "204":
          description: User grant removed (idempotent).
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{user_id}/effective-access:
    get:
      summary: Get practical effective access view for a user
      operationId: getAdminUserEffectiveAccess
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Effective user access with action sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEffectiveAccessResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/summary:
    get:
      summary: Get lightweight admin/operator recap metrics
      operationId: getAdminSummary
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: window_days
          schema:
            type: integer
            minimum: 1
            maximum: 90
      responses:
        "200":
          description: Practical session recap metrics and action counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummaryResponse"
        "400":
          description: Invalid query params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/audit/recent:
    get:
      summary: Get recent audit activity feed for admin operators
      operationId: getAdminAuditRecent
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Recent audit items ordered newest-first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuditRecentResponse"
        "400":
          description: Invalid query params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/audit/events:
    get:
      summary: Search audit events with practical admin/auditor filters
      operationId: getAdminAuditEvents
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: event_type
          schema:
            type: string
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: asset_id
          schema:
            type: string
            format: uuid
        - in: query
          name: session_id
          schema:
            type: string
            format: uuid
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
